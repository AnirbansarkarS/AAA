<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#grad1)" rx="24"/>
  
  <!-- Robot face -->
  <g transform="translate(64, 50)">
    <!-- Head -->
    <rect x="-20" y="-18" width="40" height="36" fill="#CDFF00" rx="8"/>
    
    <!-- Eyes -->
    <circle cx="-8" cy="-6" r="4" fill="#333"/>
    <circle cx="8" cy="-6" r="4" fill="#333"/>
    
    <!-- Smile -->
    <path d="M -8 6 Q 0 10 8 6" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Document/Form -->
  <g transform="translate(64, 75)">
    <rect x="-15" y="-10" width="30" height="20" fill="white" stroke="#667eea" stroke-width="2" rx="2"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#667eea" stroke-width="1.5"/>
    <line x1="-8" y1="-1" x2="8" y2="-1" stroke="#667eea" stroke-width="1.5"/>
    <line x1="-8" y1="2" x2="6" y2="2" stroke="#667eea" stroke-width="1.5"/>
  </g>
  
  <!-- Checkmark -->
  <g transform="translate(85, 70)">
    <path d="M 0 5 L 3 8 L 8 0" stroke="#CDFF00" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
