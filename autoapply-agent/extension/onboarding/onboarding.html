<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoApply Agent - Onboarding</title>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      border: 4px solid #8a4eed;
      border-radius: 20px;
      padding: 30px;
      width: 400px;
      box-shadow: 4px 4px 0px #000;
    }
    h1 {
      font-family: 'Press Start 2P', cursive, sans-serif;
      font-size: 16px;
      color: #8a4eed;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 14px;
    }
    input, textarea, select {
      padding: 8px;
      border: 2px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
    }
    button {
      background-color: #b7e841;
      color: #000;
      border: 2px solid #000;
      border-radius: 20px;
      padding: 10px;
      font-weight: 800;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 2px 2px 0px #000;
      margin-top: 10px;
    }
    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px #000;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>?? Agent Setup</h1>
    <form id="onboardingForm">
      <div class="form-group">
        <label>1. Full Name</label>
        <input type="text" id="pName" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label>2. Top Skills (comma separated)</label>
        <input type="text" id="pSkills" placeholder="React, Node.js, UI/UX" required>
      </div>
      <div class="form-group">
        <label>3. Current/Recent Project</label>
        <textarea id="pProject" rows="2" placeholder="Building an AI Chrome extension..." required></textarea>
      </div>
      <div class="form-group">
        <label>4. Career Goal</label>
        <input type="text" id="pGoal" placeholder="Senior Frontend Developer at a startup" required>
      </div>
      <div class="form-group">
        <label>5. Preferred Tone</label>
        <select id="pTone">
          <option value="Professional & concise">Professional & concise</option>
          <option value="Enthusiastic & passionate">Enthusiastic & passionate</option>
          <option value="Direct & data-driven">Direct & data-driven</option>
        </select>
      </div>
      <button type="submit">SAVE PROFILE ??</button>
    </form>
  </div>

  <script src="onboarding.js"></script>
</body>
</html>
