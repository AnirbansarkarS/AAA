<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenhouse/Workday Fake Application Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f0f0f0; display:flex; justify-content:center; }
    .container { background: #fff; width: 600px; padding: 40px; margin-top: 50px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 5px; }
    p.desc { color: #666; margin-bottom: 20px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
    input[type="text"], textarea { width: 100%; border: 1px solid #ccc; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 14px; }
    .button-group { margin-top: 30px; }
    button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Software Engineer, Prompt Generation</h1>
    <p class="desc">TechCorp Inc. | San Francisco, CA | On-site</p>
    <p class="desc">We are looking for a rockstar developer with React, Node.js, and extreme startup experience to craft prompts and LLM-powered interfaces. Bonus points if you've built Chrome extensions.</p>

    <form>
      <div class="form-group">
        <label for="q1">Why do you want to work at TechCorp?</label>
        <textarea id="q1" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label for="q2">Please describe a recent project you completed and the tech stack you used.</label>
        <textarea id="q2" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label for="q3">Provide a summary of your career goals.</label>
        <textarea id="q3" rows="3"></textarea>
      </div>

      <div class="button-group">
        <button type="button">SUBMIT APPLICATION</button>
      </div>
    </form>
  </div>

</body>
</html>
